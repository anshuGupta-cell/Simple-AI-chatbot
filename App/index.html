<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium AI Chat UI</title>
  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="chat-container">
    <div class="chat-header">
      <div class="left">
        <div class="avatar-wrapper">
          <div class="avatar">AI</div>
          <div class="status-dot"></div>
        </div>
        <div>
          <div class="title">Gemini Assistant</div>
          <div class="status-text">Active Now</div>
        </div>
      </div>
      <div style="color: var(--text-muted); cursor: pointer;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="1" />
          <circle cx="12" cy="5" r="1" />
          <circle cx="12" cy="19" r="1" />
        </svg>
      </div>
    </div>

    <div class="chat-box" id="chatBox">
      <div class="message received" style="animation-delay: 0.1s">
        Hi there! I've been updated with a sleek new glassmorphism interface. How does it look?
        <span class="time">10:45 AM</span>
      </div>
      <div class="message sent" style="animation-delay: 0.3s">
        It looks incredible. The depth and animations make a huge difference! 🚀
        <span class="time">10:46 AM</span>
      </div>
    </div>

    <form class="chat-input-area" id="chatForm">
      <div class="input-wrapper">
        <input type="text" id="userInput" placeholder="Ask me anything..." autocomplete="off">
        <button class="send-btn" type="submit">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </form>
  </div>

  <script>
    const chatForm = document.getElementById('chatForm');
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');

    // function scrollToBottom() {
    //   chatBox.scrollTop = chatBox.scrollHeight;
    // }

    function addMessage(text, type) {
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const msgDiv = document.createElement('div');
      msgDiv.classList.add('message', type);
      msgDiv.innerHTML = `${text} <span class="time">${time}</span>`;
      chatBox.appendChild(msgDiv);
      // scrollToBottom();
    }

    function showLoading(id) {
      const loadingDiv = document.createElement('div');
      loadingDiv.id = id;
      loadingDiv.className = 'typing-indicator';
      loadingDiv.innerHTML = `
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
    `;
      chatBox.appendChild(loadingDiv);
      // scrollToBottom();
    }

    // Initial scroll
    // scrollToBottom();

    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', () => {
        // Get the actual height available to the user
        const currentHeight = window.visualViewport.height;

        // Apply this height to your main wrapper
        document.body.style.height = `${currentHeight}px`;

        // Scroll the input into view if needed
        if (document.activeElement.tagName === 'INPUT' ||
          document.activeElement.tagName === 'TEXTAREA') {
          document.activeElement.scrollIntoView({ behavior: 'smooth' });
        }
      });
    }
  </script>

  <script src="main.js"></script>

</body>

</html>
